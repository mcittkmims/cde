<svg width="250" height="150" viewBox="0 0 250 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Sursa E1 -->
  <line x1="50" y1="40" x2="50" y2="110" stroke="black" />
  <line x1="40" y1="70" x2="60" y2="70" stroke="black" stroke-width="2"/>
  <line x1="45" y1="75" x2="55" y2="75" stroke="black" stroke-width="3"/>
  <text x="30" y="75" font-family="Arial" font-size="10">E1</text>
  <text x="60" y="65" font-family="Arial" font-size="10">+</text>
  <text x="60" y="85" font-family="Arial" font-size="10">-</text>

  <!-- Linia superioara -->
  <line x1="50" y1="40" x2="100" y2="40" stroke="black" />
  
  <!-- Curent Id1 si Sursa VD1 (in loc de D1) -->
  <polygon points="90,37 90,43 95,40" fill="black" />
  <text x="85" y="35" font-family="Arial" font-size="8">I<sub>D1</sub></text>
  <line x1="100" y1="30" x2="100" y2="50" stroke="black" stroke-width="2"/>
  <text x="95" y="25" font-family="Arial" font-size="8">+</text>
  <line x1="105" y1="35" x2="105" y2="45" stroke="black" stroke-width="3"/>
  <text x="110" y="55" font-family="Arial" font-size="10">V<sub>D1</sub></text>
  
  <line x1="105" y1="40" x2="150" y2="40" stroke="black" />

  <!-- Ramura centrala I_D2 si Sursa VD2 -->
  <line x1="150" y1="40" x2="150" y2="60" stroke="black" />
  <polygon points="147,50 153,50 150,55" fill="black" />
  <text x="155" y="50" font-family="Arial" font-size="8">I<sub>D2</sub></text>
  <line x1="140" y1="60" x2="160" y2="60" stroke="black" stroke-width="2"/>
  <text x="135" y="55" font-family="Arial" font-size="8">+</text>
  <line x1="145" y1="65" x2="155" y2="65" stroke="black" stroke-width="3"/>
  <text x="160" y="75" font-family="Arial" font-size="10">V<sub>D2</sub></text>
  <line x1="150" y1="65" x2="150" y2="110" stroke="black" />

  <!-- Linia dreapta -->
  <line x1="150" y1="40" x2="190" y2="40" stroke="black" />
  <!-- Rezistenta R2 -->
  <rect x="190" y="35" width="30" height="10" fill="none" stroke="black" />
  <text x="200" y="30" font-family="Arial" font-size="10">R2</text>
  <line x1="220" y1="40" x2="230" y2="40" stroke="black" />
  <line x1="230" y1="40" x2="230" y2="110" stroke="black" />
  <polygon points="230,70 227,65 233,65" fill="black" />
  <text x="235" y="65" font-family="Arial" font-size="8">I</text>

  <!-- Rezistenta R1 -->
  <line x1="50" y1="110" x2="90" y2="110" stroke="black" />
  <rect x="90" y="105" width="30" height="10" fill="none" stroke="black" />
  <text x="100" y="125" font-family="Arial" font-size="10">R1</text>
  <line x1="120" y1="110" x2="230" y2="110" stroke="black" />

</svg>