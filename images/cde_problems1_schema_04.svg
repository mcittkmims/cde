<svg viewBox="0 0 450 400" width="450" height="400" xmlns="http://www.w3.org/2000/svg">
  <g stroke="black" stroke-width="1.5" fill="none">
    <!-- Source / Battery -->
    <line x1="80" y1="50" x2="80" y2="180"/>
    <line x1="65" y1="180" x2="95" y2="180" stroke-width="3"/> <!-- Long bar + -->
    <line x1="72" y1="190" x2="88" y2="190" stroke-width="3"/> <!-- Short bar - -->
    <line x1="80" y1="190" x2="80" y2="350"/>
    
    <text x="25" y="185" font-family="sans-serif" font-size="14" stroke="none" fill="black">Vs = 24V</text>
    <text x="65" y="170" font-family="sans-serif" font-size="14" stroke="none" fill="black">+</text>
    <text x="65" y="205" font-family="sans-serif" font-size="14" stroke="none" fill="black">-</text>

    <!-- Wires to nodes -->
    <line x1="80" y1="50" x2="160" y2="50"/>
    <line x1="80" y1="350" x2="160" y2="350"/>

    <!-- Resistors line -->
    <!-- R1 -->
    <line x1="160" y1="50" x2="160" y2="70"/>
    <path d="M 160 70 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <line x1="160" y1="146" x2="160" y2="150"/>
    <text x="180" y="85" font-family="sans-serif" font-size="12" stroke="none" fill="black">R1 = 2.8Ω</text>
    <text x="180" y="100" font-family="sans-serif" font-size="12" stroke="none" fill="black">VAB = 7.0V</text>

    <!-- Node B line -->
    <circle cx="160" cy="150" r="3" fill="black" stroke="none"/>
    <line x1="160" y1="150" x2="250" y2="150"/>

    <!-- R2 -->
    <line x1="160" y1="150" x2="160" y2="160"/>
    <path d="M 160 160 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <line x1="160" y1="236" x2="160" y2="240"/>
    <text x="180" y="175" font-family="sans-serif" font-size="12" stroke="none" fill="black">R2 = 0.68Ω</text>
    <text x="180" y="190" font-family="sans-serif" font-size="12" stroke="none" fill="black">VBC = 1.7V</text>

    <!-- Node C line -->
    <circle cx="160" cy="240" r="3" fill="black" stroke="none"/>
    <line x1="160" y1="240" x2="250" y2="240"/>

    <!-- R3 -->
    <line x1="160" y1="240" x2="160" y2="250"/>
    <path d="M 160 250 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <line x1="160" y1="326" x2="160" y2="330"/>
    <text x="180" y="265" font-family="sans-serif" font-size="12" stroke="none" fill="black">R3 = 1.32Ω</text>
    <text x="180" y="280" font-family="sans-serif" font-size="12" stroke="none" fill="black">VC = 3.3V</text>

    <!-- 0V Node (Ground) -->
    <circle cx="160" cy="330" r="3" fill="black" stroke="none"/>
    <line x1="160" y1="330" x2="270" y2="330"/>
    <!-- Ground symbol at end of 0V line -->
    <line x1="270" y1="330" x2="270" y2="350"/>
    <line x1="260" y1="350" x2="280" y2="350"/>
    <line x1="265" y1="355" x2="275" y2="355"/>
    <line x1="268" y1="360" x2="272" y2="360"/>
    <text x="285" y="325" font-family="sans-serif" font-size="12" stroke="none" fill="#d32f2f">0V</text>

    <!-- R4 -->
    <line x1="160" y1="330" x2="160" y2="340"/>
    <path d="M 160 340 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <line x1="160" y1="416" x2="160" y2="420"/> 
    <text x="180" y="355" font-family="sans-serif" font-size="12" stroke="none" fill="black">R4 = 4.8Ω</text>
    <text x="180" y="370" font-family="sans-serif" font-size="12" stroke="none" fill="black">VD = 12V</text>

    <!-- Top Node A line -->
    <circle cx="160" cy="50" r="3" fill="black" stroke="none"/>
    <line x1="160" y1="50" x2="250" y2="50"/>

    <!-- Bottom Node D line -->
    <circle cx="160" cy="420" r="3" fill="black" stroke="none"/>
    <line x1="80" y1="350" x2="80" y2="420"/>
    <line x1="80" y1="420" x2="250" y2="420"/>

    <!-- Tap point voltage arrows and labels -->
    <g stroke="black" fill="black">
      <polygon points="255,50 248,47 248,53" stroke="none"/>
      <text x="260" y="54" font-family="sans-serif" font-size="12" stroke="none" fill="#d32f2f">VA = +12V</text>

      <polygon points="255,150 248,147 248,153" stroke="none"/>
      <text x="260" y="154" font-family="sans-serif" font-size="12" stroke="none" fill="#d32f2f">VB = +5V</text>

      <polygon points="255,240 248,237 248,243" stroke="none"/>
      <text x="260" y="244" font-family="sans-serif" font-size="12" stroke="none" fill="#d32f2f">VC = +3.3V</text>

      <polygon points="255,420 248,417 248,423" stroke="none"/>
      <text x="260" y="424" font-family="sans-serif" font-size="12" stroke="none" fill="#d32f2f">VD = -12V</text>
    </g>

    <!-- Current I arrow -->
    <g fill="black">
      <line x1="80" y1="130" x2="80" y2="90"/>
      <polygon points="80,85 75,95 85,95" stroke="none"/>
      <text x="25" y="115" font-family="sans-serif" font-size="14" stroke="none">I = 2.5A</text>
    </g>
  </g>
</svg>