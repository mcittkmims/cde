<svg width="250" height="150" viewBox="0 0 250 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Sursa E1 -->
  <line x1="50" y1="40" x2="50" y2="110" stroke="black" />
  <line x1="40" y1="70" x2="60" y2="70" stroke="black" stroke-width="2"/>
  <line x1="45" y1="75" x2="55" y2="75" stroke="black" stroke-width="3"/>
  <text x="30" y="75" font-family="Arial" font-size="10">E1</text>
  <text x="60" y="65" font-family="Arial" font-size="10">+</text>
  <text x="60" y="85" font-family="Arial" font-size="10">-</text>

  <!-- Linia superioara spre D1 -->
  <line x1="50" y1="40" x2="100" y2="40" stroke="black" />
  
  <!-- Dioda D1 -->
  <polygon points="100,35 100,45 110,40" fill="black" />
  <line x1="110" y1="35" x2="110" y2="45" stroke="black" stroke-width="2"/>
  <text x="100" y="30" font-family="Arial" font-size="10">D1</text>
  
  <!-- Continuare linie superioara -->
  <line x1="110" y1="40" x2="150" y2="40" stroke="black" />
  <line x1="150" y1="40" x2="190" y2="40" stroke="black" />

  <!-- Ramura centrala D2 -->
  <line x1="150" y1="40" x2="150" y2="60" stroke="black" />
  <polygon points="145,60 155,60 150,70" fill="black" />
  <line x1="145" y1="70" x2="155" y2="70" stroke="black" stroke-width="2"/>
  <line x1="150" y1="70" x2="150" y2="110" stroke="black" />
  <text x="160" y="65" font-family="Arial" font-size="10">D2</text>

  <!-- Rezistenta R2 -->
  <rect x="190" y="35" width="30" height="10" fill="none" stroke="black" />
  <text x="200" y="30" font-family="Arial" font-size="10">R2</text>
  <line x1="220" y1="40" x2="230" y2="40" stroke="black" />
  <line x1="230" y1="40" x2="230" y2="110" stroke="black" />

  <!-- Rezistenta R1 -->
  <line x1="50" y1="110" x2="90" y2="110" stroke="black" />
  <rect x="90" y="105" width="30" height="10" fill="none" stroke="black" />
  <text x="100" y="125" font-family="Arial" font-size="10">R1</text>
  <line x1="120" y1="110" x2="230" y2="110" stroke="black" />

</svg>