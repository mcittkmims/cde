<svg viewBox="0 0 200 300" width="200" height="300" xmlns="http://www.w3.org/2000/svg">
  <g stroke="black" stroke-width="2" fill="none">
    <!-- Top terminal -->
    <circle cx="100" cy="30" r="5" fill="#ccc"/>
    <text x="65" y="35" font-family="sans-serif" font-size="16" stroke="none" fill="black">Vs</text>
    <text x="115" y="35" font-family="sans-serif" font-size="16" stroke="none" fill="black">+</text>
    <line x1="100" y1="35" x2="100" y2="60"/>
    
    <!-- Resistor R1 -->
    <path d="M 100 60 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <text x="65" y="105" font-family="sans-serif" font-size="16" stroke="none" fill="black">R1</text>
    
    <!-- Middle Node -->
    <line x1="100" y1="151" x2="100" y2="170"/>
    <circle cx="100" cy="160" r="3" fill="black" stroke="none"/>
    <line x1="100" y1="160" x2="140" y2="160"/>
    <circle cx="140" cy="160" r="3" fill="black" stroke="none"/>
    <text x="145" y="150" font-family="sans-serif" font-size="16" stroke="none" fill="black">Vo</text>
    
    <!-- Resistor R2 -->
    <line x1="100" y1="170" x2="100" y2="190"/>
    <path d="M 100 190 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <text x="65" y="235" font-family="sans-serif" font-size="16" stroke="none" fill="black">R2</text>
    
    <!-- Bottom terminal -->
    <line x1="100" y1="281" x2="100" y2="290"/>
    <line x1="85" y1="290" x2="115" y2="290"/>
    <text x="115" y="280" font-family="sans-serif" font-size="16" stroke="none" fill="black">-</text>

    <!-- Current Arrows -->
    <g stroke="brown" fill="brown">
      <line x1="45" y1="110" x2="45" y2="140"/>
      <polygon points="45,145 40,135 50,135" stroke="none"/>
      <text x="30" y="135" font-family="sans-serif" font-size="16" stroke="none">I</text>

      <line x1="45" y1="240" x2="45" y2="270"/>
      <polygon points="45,275 40,265 50,265" stroke="none"/>
      <text x="30" y="265" font-family="sans-serif" font-size="16" stroke="none">I</text>
    </g>

    <!-- Voltage drop VR1 -->
    <g stroke="#333" stroke-width="1">
      <line x1="125" y1="140" x2="125" y2="60"/>
      <polygon points="125,55 120,65 130,65" fill="#333" stroke="none"/>
      <text x="130" y="105" font-family="sans-serif" font-size="14" stroke="none" fill="black">VR1</text>
      <text x="120" y="50" font-family="sans-serif" font-size="14" stroke="none" fill="black">+</text>
      <text x="122" y="150" font-family="sans-serif" font-size="14" stroke="none" fill="black">-</text>
    </g>

    <!-- Voltage drop VR2 -->
    <g stroke="#333" stroke-width="1">
      <line x1="125" y1="270" x2="125" y2="190"/>
      <polygon points="125,185 120,195 130,195" fill="#333" stroke="none"/>
      <text x="130" y="235" font-family="sans-serif" font-size="14" stroke="none" fill="black">VR2</text>
      <text x="120" y="180" font-family="sans-serif" font-size="14" stroke="none" fill="black">+</text>
      <text x="122" y="280" font-family="sans-serif" font-size="14" stroke="none" fill="black">-</text>
    </g>
  </g>
</svg>