<svg viewBox="0 0 400 250" width="400" height="250" xmlns="http://www.w3.org/2000/svg">
  <g stroke="black" stroke-width="1.5" fill="none">
    <!-- Source / Battery -->
    <line x1="80" y1="70" x2="80" y2="120"/>
    <line x1="65" y1="120" x2="95" y2="120" stroke-width="3"/> <!-- Long bar + -->
    <line x1="72" y1="128" x2="88" y2="128" stroke-width="3"/> <!-- Short bar - -->
    <line x1="80" y1="128" x2="80" y2="180"/>
    
    <text x="30" y="125" font-family="sans-serif" font-size="14" stroke="none" fill="black">Vs = 36V</text>
    <text x="70" y="110" font-family="sans-serif" font-size="14" stroke="none" fill="black">+</text>
    <text x="72" y="145" font-family="sans-serif" font-size="14" stroke="none" fill="black">-</text>

    <!-- Wires -->
    <line x1="80" y1="70" x2="130" y2="70"/>
    <line x1="80" y1="180" x2="130" y2="180"/>
    
    <!-- R1 (Top) -->
    <line x1="130" y1="70" x2="150" y2="70"/>
    <path d="M 150 70 l 8 -15 l 15 30 l 15 -30 l 15 30 l 15 -30 l 15 30 l 8 -15"/>
    <line x1="241" y1="70" x2="270" y2="70"/>
    <text x="155" y="95" font-family="sans-serif" font-size="12" stroke="none" fill="black">R1 = 6kΩ</text>

    <!-- R2 (Right) -->
    <line x1="270" y1="70" x2="270" y2="100"/>
    <path d="M 270 100 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <line x1="270" y1="191" x2="270" y2="180"/>
    <text x="200" y="140" font-family="sans-serif" font-size="12" stroke="none" fill="black">R2 = 12kΩ</text>

    <!-- R3 (Bottom) -->
    <line x1="270" y1="180" x2="241" y2="180"/>
    <path d="M 241 180 l -8 -15 l -15 30 l -15 -30 l -15 30 l -15 -30 l -15 30 l -8 -15"/>
    <line x1="150" y1="180" x2="130" y2="180"/>
    <text x="155" y="165" font-family="sans-serif" font-size="12" stroke="none" fill="black">R3 = 18kΩ</text>

    <!-- Current I -->
    <g fill="black">
      <line x1="90" y1="70" x2="115" y2="70"/>
      <polygon points="120,70 110,65 110,75" stroke="none"/>
      <text x="75" y="60" font-family="sans-serif" font-size="12" stroke="none">I = 1mA</text>
    </g>

    <!-- Voltage drop labels and arrows (Red) -->
    <g stroke="#d32f2f" fill="#d32f2f" font-family="sans-serif" font-size="12">
      <!-- V1 -->
      <line x1="150" y1="45" x2="235" y2="45" stroke-dasharray="2,2"/>
      <polygon points="145,45 152,42 152,48" stroke="none"/>
      <polygon points="240,45 233,42 233,48" stroke="none"/>
      <text x="180" y="40" stroke="none">6V</text>
      <text x="140" y="65" stroke="none" fill="black">+</text>
      <text x="245" y="65" stroke="none" fill="black">-</text>
      
      <!-- V2 -->
      <line x1="290" y1="105" x2="290" y2="180" stroke-dasharray="2,2"/>
      <polygon points="290,100 287,107 293,107" stroke="none"/>
      <polygon points="290,185 287,178 293,178" stroke="none"/>
      <text x="300" y="145" stroke="none">12V</text>
      <text x="275" y="95" stroke="none" fill="black">+</text>
      <text x="275" y="185" stroke="none" fill="black">-</text>

      <!-- V3 -->
      <line x1="235" y1="205" x2="150" y2="205" stroke-dasharray="2,2"/>
      <polygon points="240,205 233,202 233,208" stroke="none"/>
      <polygon points="145,205 152,202 152,208" stroke="none"/>
      <text x="175" y="220" stroke="none">18V</text>
      <text x="245" y="195" stroke="none" fill="black">+</text>
      <text x="140" y="195" stroke="none" fill="black">-</text>
    </g>
  </g>
</svg>