<svg width="350" height="150" viewBox="0 0 350 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Sursa E1 -->
  <line x1="50" y1="50" x2="50" y2="120" stroke="black" />
  <line x1="40" y1="80" x2="60" y2="80" stroke="black" stroke-width="2"/>
  <line x1="45" y1="85" x2="55" y2="85" stroke="black" stroke-width="3"/>
  <text x="30" y="85" font-family="Arial" font-size="10">E1</text>
  <text x="60" y="75" font-family="Arial" font-size="10">+</text>
  <text x="60" y="95" font-family="Arial" font-size="10">-</text>

  <!-- Linia superioara spre R -->
  <line x1="50" y1="50" x2="80" y2="50" stroke="black" />
  
  <!-- Rezistenta R -->
  <rect x="80" y="45" width="30" height="10" fill="none" stroke="black" />
  <text x="90" y="65" font-family="Arial" font-size="10">R</text>
  
  <!-- Ramificare -->
  <line x1="110" y1="50" x2="130" y2="50" stroke="black" />
  <line x1="130" y1="30" x2="130" y2="70" stroke="black" />
  
  <!-- Dioda D1 -->
  <line x1="130" y1="30" x2="150" y2="30" stroke="black" />
  <polygon points="150,25 150,35 160,30" fill="black" />
  <line x1="160" y1="25" x2="160" y2="35" stroke="black" stroke-width="2"/>
  <line x1="160" y1="30" x2="180" y2="30" stroke="black" />
  <text x="150" y="20" font-family="Arial" font-size="10">D1</text>

  <!-- Dioda D2 -->
  <line x1="130" y1="70" x2="150" y2="70" stroke="black" />
  <polygon points="160,65 160,75 150,70" fill="black" />
  <line x1="150" y1="65" x2="150" y2="75" stroke="black" stroke-width="2"/>
  <line x1="160" y1="70" x2="180" y2="70" stroke="black" />
  <text x="150" y="85" font-family="Arial" font-size="10">D2</text>

  <!-- Unire ramificare -->
  <line x1="180" y1="30" x2="180" y2="70" stroke="black" />
  <line x1="180" y1="50" x2="250" y2="50" stroke="black" />

  <!-- Sursa E2 -->
  <line x1="250" y1="50" x2="250" y2="80" stroke="black" />
  <line x1="240" y1="80" x2="260" y2="80" stroke="black" stroke-width="3"/>
  <line x1="245" y1="85" x2="255" y2="85" stroke="black" stroke-width="2"/>
  <text x="225" y="85" font-family="Arial" font-size="10">E2</text>
  <text x="260" y="75" font-family="Arial" font-size="10">-</text>
  <text x="260" y="95" font-family="Arial" font-size="10">+</text>

  <!-- Linia dreapta de jos -->
  <line x1="250" y1="85" x2="250" y2="120" stroke="black" />
  
  <!-- Linia inferioara -->
  <line x1="50" y1="120" x2="250" y2="120" stroke="black" />

</svg>