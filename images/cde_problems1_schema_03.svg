<svg viewBox="0 0 350 400" width="350" height="400" xmlns="http://www.w3.org/2000/svg">
  <g stroke="black" stroke-width="1.5" fill="none">
    <!-- Source / Battery -->
    <line x1="80" y1="50" x2="80" y2="180"/>
    <line x1="65" y1="180" x2="95" y2="180" stroke-width="3"/> <!-- Long bar + -->
    <line x1="72" y1="190" x2="88" y2="190" stroke-width="3"/> <!-- Short bar - -->
    <line x1="80" y1="190" x2="80" y2="350"/>
    <line x1="70" y1="350" x2="90" y2="350"/>
    <line x1="75" y1="355" x2="85" y2="355"/>
    <line x1="78" y1="360" x2="82" y2="360"/>
    
    <text x="45" y="180" font-family="sans-serif" font-size="14" stroke="none" fill="black">Vs</text>
    <text x="65" y="170" font-family="sans-serif" font-size="14" stroke="none" fill="black">+</text>
    <text x="65" y="205" font-family="sans-serif" font-size="14" stroke="none" fill="black">-</text>

    <!-- Wires to nodes -->
    <line x1="80" y1="50" x2="160" y2="50"/>
    <line x1="80" y1="330" x2="160" y2="330"/>

    <!-- Resistors line -->
    <!-- R1 -->
    <line x1="160" y1="50" x2="160" y2="70"/>
    <path d="M 160 70 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <line x1="160" y1="146" x2="160" y2="150"/>
    <text x="180" y="85" font-family="sans-serif" font-size="12" stroke="none" fill="black">R1</text>
    <text x="180" y="100" font-family="sans-serif" font-size="12" stroke="none" fill="black">8.0kΩ</text>

    <!-- Node B line -->
    <circle cx="160" cy="150" r="3" fill="black" stroke="none"/>
    <line x1="160" y1="150" x2="250" y2="150"/>

    <!-- R2 -->
    <line x1="160" y1="150" x2="160" y2="160"/>
    <path d="M 160 160 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <line x1="160" y1="236" x2="160" y2="240"/>
    <text x="180" y="175" font-family="sans-serif" font-size="12" stroke="none" fill="black">R2</text>
    <text x="180" y="190" font-family="sans-serif" font-size="12" stroke="none" fill="black">4.0kΩ</text>

    <!-- Node C line -->
    <circle cx="160" cy="240" r="3" fill="black" stroke="none"/>
    <line x1="160" y1="240" x2="250" y2="240"/>

    <!-- R3 -->
    <line x1="160" y1="240" x2="160" y2="250"/>
    <path d="M 160 250 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <line x1="160" y1="326" x2="160" y2="330"/>
    <text x="180" y="265" font-family="sans-serif" font-size="12" stroke="none" fill="black">R3</text>
    <text x="180" y="280" font-family="sans-serif" font-size="12" stroke="none" fill="black">2.0kΩ</text>

    <!-- Node D line -->
    <circle cx="160" cy="330" r="3" fill="black" stroke="none"/>
    <line x1="160" y1="330" x2="250" y2="330"/>

    <!-- R4 -->
    <line x1="160" y1="330" x2="160" y2="340"/>
    <path d="M 160 340 l 15 8 l -30 15 l 30 15 l -30 15 l 30 15 l -30 15 l 15 8"/>
    <line x1="160" y1="416" x2="160" y2="430"/> <!-- Extending down slightly -->
    <text x="180" y="355" font-family="sans-serif" font-size="12" stroke="none" fill="black">R4</text>
    <text x="180" y="370" font-family="sans-serif" font-size="12" stroke="none" fill="black">1.0kΩ</text>

    <!-- Top Node A line -->
    <circle cx="160" cy="50" r="3" fill="black" stroke="none"/>
    <line x1="160" y1="50" x2="250" y2="50"/>

    <!-- Bottom Node E line -->
    <circle cx="160" cy="430" r="3" fill="black" stroke="none"/> <!-- Actual bottom connection -->
    <line x1="80" y1="330" x2="80" y2="430"/>
    <line x1="80" y1="430" x2="250" y2="430"/>
    <line x1="160" y1="416" x2="160" y2="430"/>
    <line x1="150" y1="430" x2="170" y2="430"/>
    <line x1="155" y1="435" x2="165" y2="435"/>
    <line x1="158" y1="440" x2="162" y2="440"/>

    <!-- Tap point labels -->
    <text x="260" y="55" font-family="sans-serif" font-size="12" stroke="none" fill="black">A</text>
    <text x="260" y="155" font-family="sans-serif" font-size="12" stroke="none" fill="black">B</text>
    <text x="260" y="245" font-family="sans-serif" font-size="12" stroke="none" fill="black">C</text>
    <text x="260" y="335" font-family="sans-serif" font-size="12" stroke="none" fill="black">D</text>
    <text x="260" y="435" font-family="sans-serif" font-size="12" stroke="none" fill="black">E</text>

    <!-- Voltage drop indicators (Red Arrows) -->
    <g stroke="#800000" fill="#800000">
      <line x1="240" y1="55" x2="240" y2="145" stroke-width="1"/>
      <polygon points="240,50 237,58 243,58" stroke="none"/>
      <polygon points="240,150 237,142 243,142" stroke="none"/>
      <text x="245" y="105" font-family="sans-serif" font-size="12" stroke="none">VAB</text>

      <line x1="240" y1="155" x2="240" y2="235" stroke-width="1"/>
      <polygon points="240,150 237,158 243,158" stroke="none"/>
      <polygon points="240,240 237,232 243,232" stroke="none"/>
      <text x="245" y="200" font-family="sans-serif" font-size="12" stroke="none">VBC</text>

      <line x1="240" y1="245" x2="240" y2="325" stroke-width="1"/>
      <polygon points="240,240 237,248 243,248" stroke="none"/>
      <polygon points="240,330 237,322 243,322" stroke="none"/>
      <text x="245" y="290" font-family="sans-serif" font-size="12" stroke="none">VCD</text>

      <line x1="240" y1="335" x2="240" y2="425" stroke-width="1"/>
      <polygon points="240,330 237,338 243,338" stroke="none"/>
      <polygon points="240,430 237,422 243,422" stroke="none"/>
      <text x="245" y="380" font-family="sans-serif" font-size="12" stroke="none">VDE</text>
    </g>

    <!-- Current I arrow -->
    <g fill="black">
      <line x1="80" y1="130" x2="80" y2="100"/>
      <polygon points="80,95 75,105 85,105" stroke="none"/>
      <text x="60" y="115" font-family="sans-serif" font-size="14" stroke="none">I</text>
    </g>
  </g>
</svg>