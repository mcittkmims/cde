<svg width="250" height="150" viewBox="0 0 250 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Sursa E -->
  <line x1="50" y1="50" x2="50" y2="110" stroke="black" />
  <line x1="40" y1="80" x2="60" y2="80" stroke="black" stroke-width="2"/>
  <line x1="45" y1="85" x2="55" y2="85" stroke="black" stroke-width="3"/>
  <text x="30" y="85" font-family="Arial" font-size="12">E</text>
  <text x="42" y="75" font-family="Arial" font-size="10">+</text>
  <text x="42" y="95" font-family="Arial" font-size="10">-</text>
  
  <!-- Linia superioara -->
  <line x1="50" y1="50" x2="80" y2="50" stroke="black" />
  
  <!-- Rezistenta R -->
  <rect x="80" y="45" width="30" height="10" fill="none" stroke="black" />
  <text x="90" y="40" font-family="Arial" font-size="12">R</text>
  
  <!-- Continuare linie superioara -->
  <line x1="110" y1="50" x2="150" y2="50" stroke="black" />
  
  <!-- Sens curent Id -->
  <line x1="150" y1="50" x2="150" y2="60" stroke="black" />
  <polygon points="147,60 153,60 150,65" fill="black" />
  <text x="160" y="60" font-family="Arial" font-size="10">I<sub>D</sub></text>
  <text x="160" y="70" font-family="Arial" font-size="8">anod</text>
  <text x="155" y="80" font-family="Arial" font-size="8">+</text>

  <!-- Sursa Vd -->
  <line x1="150" y1="65" x2="150" y2="85" stroke="black" />
  <line x1="140" y1="85" x2="160" y2="85" stroke="black" stroke-width="2"/>
  <line x1="145" y1="90" x2="155" y2="90" stroke="black" stroke-width="3"/>
  <text x="165" y="90" font-family="Arial" font-size="12">V<sub>D</sub></text>
  <text x="155" y="100" font-family="Arial" font-size="8">-</text>
  <text x="160" y="110" font-family="Arial" font-size="8">catod</text>

  <line x1="150" y1="90" x2="150" y2="110" stroke="black" />
  
  <!-- Linia inferioara -->
  <line x1="50" y1="110" x2="150" y2="110" stroke="black" />
</svg>