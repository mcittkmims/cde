<svg width="250" height="150" viewBox="0 0 250 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Sursa E -->
  <line x1="50" y1="70" x2="50" y2="130" stroke="black" />
  <line x1="40" y1="100" x2="60" y2="100" stroke="black" stroke-width="2"/>
  <line x1="45" y1="105" x2="55" y2="105" stroke="black" stroke-width="3"/>
  <text x="30" y="105" font-family="Arial" font-size="12">E</text>
  <text x="42" y="95" font-family="Arial" font-size="10">+</text>
  <text x="42" y="115" font-family="Arial" font-size="10">-</text>
  
  <!-- Linia superioara -->
  <line x1="50" y1="70" x2="80" y2="70" stroke="black" />
  
  <!-- Rezistenta R -->
  <rect x="80" y="65" width="30" height="10" fill="none" stroke="black" />
  <text x="90" y="60" font-family="Arial" font-size="12">R</text>
  
  <!-- Continuare linie superioara -->
  <line x1="110" y1="70" x2="150" y2="70" stroke="black" />
  
  <!-- Dioda D -->
  <line x1="150" y1="70" x2="150" y2="95" stroke="black" />
  <polygon points="140,95 160,95 150,110" fill="black" />
  <line x1="140" y1="110" x2="160" y2="110" stroke="black" stroke-width="2"/>
  <line x1="150" y1="110" x2="150" y2="130" stroke="black" />
  <text x="165" y="105" font-family="Arial" font-size="12">D</text>
  <text x="160" y="85" font-family="Arial" font-size="10">anod</text>
  <text x="160" y="120" font-family="Arial" font-size="10">catod</text>
  
  <!-- Linia inferioara -->
  <line x1="50" y1="130" x2="150" y2="130" stroke="black" />
</svg>