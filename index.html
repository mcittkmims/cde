<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDE – Căutare Rapidă</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathWhenReady()"></script>

  <!-- marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="header-title">CDE <span>– Căutare Rapidă Probleme &amp; Teorie</span></div>
      <div class="header-controls">
        <button id="fullscreenBtn" class="icon-btn" type="button" aria-label="Comută ecran complet" title="Ecran complet" hidden>
          <svg id="fullscreenIconEnter" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="8 3 3 3 3 8"></polyline>
            <polyline points="16 3 21 3 21 8"></polyline>
            <polyline points="8 21 3 21 3 16"></polyline>
            <polyline points="16 21 21 21 21 16"></polyline>
          </svg>
          <svg id="fullscreenIconExit" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
            <polyline points="9 3 9 9 3 9"></polyline>
            <polyline points="15 3 15 9 21 9"></polyline>
            <polyline points="9 21 9 15 3 15"></polyline>
            <polyline points="15 21 15 15 21 15"></polyline>
          </svg>
        </button>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="search"
        placeholder="Caută: dioda, kirchhoff, RE, 20mA, divizor, paralel…"
        autocomplete="off" autofocus>
    </div>
  </div>
</header>

<div class="filters" id="filters">
  <span class="chip active" data-filter="all">Toate</span>
  <span class="chip" data-filter="problem">Probleme</span>
  <span class="chip" data-filter="theory">Teorie / Concepte</span>
  <span class="chip" data-filter="TEMA 1">T1 · Calcule &amp; Conversii</span>
  <span class="chip" data-filter="TEMA 2">T2 · Legea lui Ohm</span>
  <span class="chip" data-filter="TEMA 3">T3 · Kirchhoff</span>
  <span class="chip" data-filter="TEMA 4">T4 · Divizoare de Tensiune</span>
  <span class="chip" data-filter="TEMA 5">T5 · Diode Semiconductoare</span>
</div>

<main>
  <div class="results-info" id="info"></div>
  <div id="results"></div>
</main>

<script src="data.js?v=7"></script>
<script src="app.js"></script>

</body>
</html>
