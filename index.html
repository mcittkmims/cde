<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDE – Căutare Rapidă</title>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathWhenReady()"></script>

  <!-- marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242736;
      --border: #2e3247;
      --accent: #6c63ff;
      --accent2: #4ade80;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --problem: #3b82f6;
      --theory: #8b5cf6;
      --theme1: #f59e0b;
      --theme2: #10b981;
      --theme3: #3b82f6;
      --theme4: #ef4444;
      --theme5: #ec4899;
      --theory-color: #8b5cf6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    .header-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.03em;
      margin-bottom: 0.9rem;
    }

    .header-title span { color: var(--text-muted); font-weight: 400; }

    /* ── SEARCH BOX ── */
    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.05rem;
      padding: 0.75rem 1rem 0.75rem 2.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #search::placeholder { color: var(--text-muted); }
    #search:focus { border-color: var(--accent); }

    /* ── FILTER BAR ── */
    .filters {
      max-width: 900px;
      margin: 0.9rem auto 0;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0 1.5rem;
    }

    .chip {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.3rem 0.85rem;
      transition: all 0.15s;
      user-select: none;
    }

    .chip:hover { border-color: var(--accent); color: var(--text); }

    .chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108,99,255,0.12);
    }

    /* ── MAIN ── */
    main {
      max-width: 900px;
      margin: 1.5rem auto;
      padding: 0 1.5rem 3rem;
    }

    .results-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 0.9rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: #4a5070; }

    .card-header {
      align-items: center;
      cursor: pointer;
      display: flex;
      gap: 0.8rem;
      padding: 0.9rem 1.1rem;
    }

    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .badge {
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.2rem 0.55rem;
      text-transform: uppercase;
    }

    .badge-problem { background: rgba(59,130,246,0.18); color: #60a5fa; }
    .badge-theory  { background: rgba(139,92,246,0.18); color: #a78bfa; }
    .badge-t1 { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-t2 { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge-t3 { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge-t4 { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-t5 { background: rgba(236,72,153,0.15); color: #f472b6; }
    .badge-teorie { background: rgba(139,92,246,0.15); color: #a78bfa; }

    .card-title {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      min-width: 0;
    }
    .card-title-text {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .card-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-title .highlight, .card-body .highlight {
      background: rgba(108,99,255,0.3);
      border-radius: 3px;
      padding: 0 2px;
    }

    .card-chevron {
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 0.25s;
    }

    .card.open .card-chevron { transform: rotate(180deg); }

    /* ── CARD BODY ── */
    .card-body {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      display: none;
      padding: 1.2rem 1.4rem;
    }

    .card.open .card-body { display: block; }

    /* ── MARKDOWN RENDERED ── */
    .card-body h1,.card-body h2,.card-body h3 {
      color: var(--accent);
      font-size: 0.95rem;
      margin: 1rem 0 0.4rem;
    }

    .card-body p { margin: 0.5rem 0; line-height: 1.7; }

    .card-body ul, .card-body ol {
      margin: 0.5rem 0 0.5rem 1.5rem;
      line-height: 1.7;
    }

    .card-body blockquote {
      border-left: 3px solid var(--accent);
      color: var(--text-muted);
      margin: 0.6rem 0;
      padding: 0.4rem 0.8rem;
      font-size: 0.9rem;
    }

    .card-body a { color: var(--accent); }

    .card-body strong { color: #fff; }

    .card-body code {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.85em;
      padding: 0.1em 0.4em;
    }

    .card-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.9rem 0;
    }

    .card-body table {
      border-collapse: collapse;
      font-size: 0.88rem;
      margin: 0.7rem 0;
      width: 100%;
    }

    .card-body th {
      background: rgba(108,99,255,0.15);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 0.7rem;
      text-align: left;
    }

    .card-body td {
      border: 1px solid var(--border);
      padding: 0.35rem 0.7rem;
    }

    .card-body img {
      background: #ffffff;
      border-radius: 8px;
      display: block;
      margin: 0.7rem auto;
      max-width: 100%;
      padding: 0.75rem 1rem;
    }

    /* KaTeX display-mode centering */
    .card-body .katex-display { margin: 0.6rem 0; }

    /* ── EMPTY STATE ── */
    .empty {
      color: var(--text-muted);
      font-size: 0.95rem;
      padding: 3rem 0;
      text-align: center;
    }

    .empty strong { color: var(--text); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .card-title { font-size: 0.88rem; }
      #search { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">CDE <span>– Căutare Rapidă Probleme &amp; Teorie</span></div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="search"
        placeholder="Caută: dioda, kirchhoff, RE, 20mA, divizor, paralel…"
        autocomplete="off" autofocus>
    </div>
  </div>
</header>

<div class="filters" id="filters">
  <span class="chip active" data-filter="all">Toate</span>
  <span class="chip" data-filter="problem">Probleme</span>
  <span class="chip" data-filter="theory">Teorie / Concepte</span>
  <span class="chip" data-filter="TEMA 1">T1 · Calcule &amp; Conversii</span>
  <span class="chip" data-filter="TEMA 2">T2 · Legea lui Ohm</span>
  <span class="chip" data-filter="TEMA 3">T3 · Kirchhoff</span>
  <span class="chip" data-filter="TEMA 4">T4 · Divizoare de Tensiune</span>
  <span class="chip" data-filter="TEMA 5">T5 · Diode Semiconductoare</span>
</div>

<main>
  <div class="results-info" id="info"></div>
  <div id="results"></div>
</main>

<script src="data.js?v=7"></script>
<script>
// ── State ──────────────────────────────────────────────────────────
let query = '';
let activeFilter = 'all';
let mathReady = false;

// ── KaTeX auto-render ──────────────────────────────────────────────
function renderMathWhenReady() {
  mathReady = true;
  renderAllMath();
}

function renderAllMath() {
  if (!mathReady) return;
  document.querySelectorAll('.card-body').forEach(el => {
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$',  right: '$',  display: false },
        { left: '\\(', right: '\\)', display: false },
        { left: '\\[', right: '\\]', display: true }
      ],
      throwOnError: false
    });
  });
}

// ── Search & filter ────────────────────────────────────────────────

// Strip diacritics so "dioda" matches "diodă", "ohm" matches etc.
function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Levenshtein distance (capped at 2 for performance)
function editDistance(a, b) {
  if (Math.abs(a.length - b.length) > 2) return 99;
  const dp = Array.from({ length: a.length + 1 }, (_, i) => [i]);
  for (let j = 1; j <= b.length; j++) dp[0][j] = j;
  for (let i = 1; i <= a.length; i++)
    for (let j = 1; j <= b.length; j++)
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[a.length][b.length];
}

// Check if a term matches a haystack string, returns match quality:
//  2 = whole-word substring match, 1 = compound-word or fuzzy, 0 = no match
function termScore(term, haystack) {
  const idx = haystack.indexOf(term);
  if (idx !== -1) {
    const before = idx === 0 || !/[a-z0-9]/.test(haystack[idx - 1]);
    const after  = idx + term.length >= haystack.length || !/[a-z0-9]/.test(haystack[idx + term.length]);
    return (before && after) ? 2 : 1;
  }
  // Fuzzy: only for terms >= 4 chars — check each word in haystack
  if (term.length >= 4) {
    const words = haystack.split(/[\s,.()\[\]{}$\\\/\-_|:;]+/).filter(w => w.length >= 3);
    const maxDist = term.length >= 6 ? 2 : 1;
    for (const w of words) {
      if (Math.abs(w.length - term.length) <= maxDist && editDistance(term, w) <= maxDist)
        return 1;
    }
  }
  return 0;
}

// Weighted fields: title=10, tags=6, themeTitle=3, content=1
function score(entry, terms) {
  if (!terms.length) return 1;

  const fields = [
    { text: normalize(entry.title),                weight: 10 },
    { text: normalize(entry.tags.join(' ')),        weight: 6  },
    { text: normalize(entry.themeTitle),            weight: 3  },
    { text: normalize(entry.theme),                 weight: 3  },
    { text: normalize(entry.type),                  weight: 2  },
    { text: normalize(entry.content),               weight: 1  },
  ];

  let total = 0;
  for (const t of terms) {
    const nt = normalize(t);
    let termTotal = 0;
    for (const f of fields) {
      const q = termScore(nt, f.text);
      if (q > 0) termTotal += q * f.weight;
    }
    total += termTotal;
  }
  return total;
}

function matchesFilter(entry) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'problem' || activeFilter === 'theory') return entry.type === activeFilter;
  return entry.theme === activeFilter;
}

function getResults() {
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  return CDE_DATA
    .filter(e => matchesFilter(e))
    .map(e => ({ entry: e, sc: score(e, terms) }))
    .filter(x => x.sc > 0)
    .sort((a, b) => b.sc - a.sc)
    .map(x => x.entry);
}

// ── Highlight query terms in title ────────────────────────────────
function highlightTitle(title) {
  if (!query.trim()) return escHtml(title);
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  let result = escHtml(title);
  terms.forEach(t => {
    const re = new RegExp('(' + escRe(t) + ')', 'gi');
    result = result.replace(re, '<span class="highlight">$1</span>');
  });
  return result;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// ── Badge helpers ──────────────────────────────────────────────────
function themeBadgeClass(theme) {
  const map = { 'TEMA 1':'t1','TEMA 2':'t2','TEMA 3':'t3','TEMA 4':'t4','TEMA 5':'t5','TEORIE':'teorie' };
  return 'badge-' + (map[theme] || 'teorie');
}

// ── Markdown + Math (protect math from marked) ────────────────────
function markdownWithMath(src) {
  const stash = [];

  // Protect $$ ... $$ display blocks first
  src = src.replace(/\$\$([\s\S]*?)\$\$/g, (m) => {
    stash.push(m);
    return `\x00MATH${stash.length - 1}\x00`;
  });

  // Protect $ ... $ inline (single-line only)
  src = src.replace(/\$([^\$\n]+?)\$/g, (m) => {
    stash.push(m);
    return `\x00MATH${stash.length - 1}\x00`;
  });

  // Now safe to parse markdown
  let html = marked.parse(src);

  // Restore math tokens
  html = html.replace(/\x00MATH(\d+)\x00/g, (_, i) => stash[+i]);

  return html;
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const results = getResults();
  const info = document.getElementById('info');
  const container = document.getElementById('results');

  info.textContent = results.length
    ? results.length + ' rezultat' + (results.length === 1 ? '' : 'e')
    : '';

  if (!results.length) {
    container.innerHTML = `<div class="empty">
      <strong>Niciun rezultat</strong> pentru "<em>${escHtml(query)}</em>"<br>
      <small>Încearcă: ohm, kirchhoff, dioda, paralel, serie, RE, mA, divisor…</small>
    </div>`;
    return;
  }

  container.innerHTML = results.map(e => `
    <div class="card" id="card-${e.id}">
      <div class="card-header" onclick="toggleCard(${e.id})">
        <div class="card-badges">
          <span class="badge badge-${e.type}">${e.type === 'problem' ? 'Problemă' : 'Teorie'}</span>
          ${e.theme !== 'TEORIE' ? `<span class="badge ${themeBadgeClass(e.theme)}">${e.theme}</span>` : ''}
        </div>
        <div class="card-title">
          <div class="card-title-text">${highlightTitle(e.title)}</div>
          <div class="card-subtitle">${escHtml(e.themeTitle)}</div>
        </div>
        <svg class="card-chevron" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="card-body" id="body-${e.id}">
        ${markdownWithMath(e.content)}
      </div>
    </div>
  `).join('');

  // Auto-open first card when searching
  if (query.trim() && results.length > 0) {
    const first = document.getElementById('card-' + results[0].id);
    if (first) first.classList.add('open');
  }

  renderAllMath();
  if (query.trim()) highlightContent(query.toLowerCase().split(/\s+/).filter(Boolean));
}

function highlightContent(terms) {
  if (!terms.length) return;
  const re = new RegExp('(' + terms.map(escRe).join('|') + ')', 'gi');
  document.querySelectorAll('.card-body').forEach(body => {
    // Walk all text nodes, skip katex and code subtrees
    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const p = node.parentElement;
        if (p.closest('.katex, code, pre')) return NodeFilter.FILTER_REJECT;
        return node.textContent.trim() ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
      }
    });
    const nodes = [];
    let n; while ((n = walker.nextNode())) nodes.push(n);
    nodes.forEach(textNode => {
      if (!re.test(textNode.textContent)) return;
      re.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let last = 0, m;
      re.lastIndex = 0;
      while ((m = re.exec(textNode.textContent)) !== null) {
        if (m.index > last) frag.appendChild(document.createTextNode(textNode.textContent.slice(last, m.index)));
        const mark = document.createElement('span');
        mark.className = 'highlight';
        mark.textContent = m[1];
        frag.appendChild(mark);
        last = m.index + m[1].length;
      }
      if (last < textNode.textContent.length) frag.appendChild(document.createTextNode(textNode.textContent.slice(last)));
      textNode.parentNode.replaceChild(frag, textNode);
    });
  });
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
  if (card.classList.contains('open')) {
    renderAllMath();
    if (query.trim()) highlightContent(query.toLowerCase().split(/\s+/).filter(Boolean));
  }
}

// ── Events ─────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  render();
});

document.getElementById('filters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeFilter = chip.dataset.filter;
  render();
});

// ── Init ───────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
